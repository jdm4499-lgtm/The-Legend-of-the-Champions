# Dragon Armor Set Configuration

## Overview
Unlock this legendary armor set after completing all four Divine Beasts. Each piece grants unique bonuses that stack together for ultimate power.

---

## Draganoid Chestplate

**Description**: A powerful chestplate that channels dragon energy

**Stats**:
- Defense: +50
- Elemental Resistance: +30% (all elements)
- Special Bonus: Reflects 20% of elemental damage back to attacker

**Effect**: Grants "Dragon's Resilience" - reduces incoming damage by 15% when all 3 pieces are equipped

**Appearance**: Dark metallic chest armor with glowing dragon patterns

---

## Mask of the Dragon

**Description**: A fearsome mask that enhances perception and abilities

**Stats**:
- Defense: +25
- Special Abilities: +40% damage
- Perception: Highlights weaknesses on enemies

**Effect**: Grants "Dragon's Sight" - see enemy weak points and health bars when all 3 pieces equipped

**Appearance**: Dragon-inspired mask with glowing eyes

---

## Greaves of Lightning

**Description**: Leg armor infused with electrical energy

**Stats**:
- Defense: +30
- Movement Speed: +25%
- Lightning Damage: +50%

**Effect**: Grants "Storm's Stride" - leave damaging electrical trails while moving when all 3 pieces equipped

**Appearance**: Metallic greaves with lightning patterns

---

## Set Bonus (All 3 Pieces)

When wearing all three pieces together:
- **Dragon's Might**: +75% all damage output
- **Elemental Mastery**: All elemental damage increased by 50%
- **Champion's Bond**: Champions gain +30% combat effectiveness
- **Legendary Aura**: Visual effect that shows dragon power surrounding Link

---

## Unlock Requirements

Each piece unlocks after defeating a specific Divine Beast:

1. **Draganoid Chestplate** - Complete Vah Ruta (Mipha's Divine Beast)
2. **Mask of the Dragon** - Complete Vah Rudania (Daruk's Divine Beast)
3. **Greaves of Lightning** - Complete Vah Medoh (Revali's Divine Beast)

*Bonus Unlock*: Complete all Divine Beasts including Vah Naboris (Urbosa's) to unlock the full set bonus effects