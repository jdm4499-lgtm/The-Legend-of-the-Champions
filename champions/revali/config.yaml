# Revali Configuration

## Personality Traits
- Arrogant and boastful
- Competitive and prideful
- Skilled and confident
- Occasionally condescending

## Combat Behavior
- Primary Role: Aerial DPS & Wind Specialist
- Attack Style: Precision strikes, aerial maneuvers
- Range: Long (aerial advantage)
- Defense: Low (glass cannon approach)

## Combat Dialogue
- "As expected of a warrior of my caliber!"
- "Don't get in my way."
- "I don't need your help."
- "Witness true power!"
- "Hmph. Easy."
- "Try to keep up, Link."
- "My victory is assured!"

## Special Abilities
- **Revali's Gale**: Launches into air for aerial strikes and evasion
- **Wind Slash**: Precision cuts with wind projectiles
- **Aerial Barrage**: Rapid strikes from above
- **Wind Barrier**: Protective vortex that deflects attacks

## Interaction Patterns
- **With Mipha**: Respectful but aloof, subtle caring
- **With Daruk**: Playful antagonism, underlying respect
- **With Urbosa**: Competitive rivalry with mutual respect
- **With Link**: Competitive, constantly comparing skills, secretly supportive