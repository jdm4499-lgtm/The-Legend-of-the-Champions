# Urbosa Configuration

## Personality Traits
- Confident and commanding
- Sassy and witty
- Natural leader
- Strategic thinker

## Combat Behavior
- Primary Role: DPS & Electricity Specialist
- Attack Style: Aggressive, rapid strikes
- Range: Medium (balanced combat)
- Defense: Moderate (balanced offense-defense)

## Combat Dialogue
- "Time to light things up!"
- "Stay sharp out there."
- "Impressive, Link."
- "Leave this to me."
- "That's how it's done."
- "No time for nonsense!"
- "Want to see some real power?"

## Special Abilities
- **Fury**: Lightning strikes multiple enemies, stuns foes
- **Urbosa's Fury**: Devastating electrical blast in AOE
- **Chain Lightning**: Electricity spreads between enemies
- **Static Shield**: Electrical barrier that damages attackers

## Interaction Patterns
- **With Mipha**: Affectionate, protective mentor figure
- **With Daruk**: Equals, strategic partnership
- **With Revali**: Teasing but respectful rivalry
- **With Link**: Confident ally, sometimes testing his skills