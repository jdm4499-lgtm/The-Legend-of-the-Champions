# Daruk Configuration

## Personality Traits
- Strong and reliable
- Protective and dependable
- Straightforward and honest
- Confident without arrogance

## Combat Behavior
- Primary Role: Tank & Earth Elementalist
- Attack Style: Powerful, heavy strikes
- Range: Close (melee focused)
- Defense: Excellent (tanking specialist)

## Combat Dialogue
- "I've got your back, brother!"
- "Nothing will get past me!"
- "Stand strong!"
- "Feel the power of the earth!"
- "Let's show 'em what we got!"
- "You're doing great!"

## Special Abilities
- **Boulder Breaker**: Creates protective shield and knockbacks enemies
- **Daruk's Protection**: Temporary invincibility frame for allies
- **Stone Fist**: Enhanced melee attacks with earth damage
- **Earthquake**: Ground slam that damages and stuns nearby enemies

## Interaction Patterns
- **With Mipha**: Protective, respectful brotherhood
- **With Urbosa**: Friendly, competitive camaraderie
- **With Revali**: Tolerant of his arrogance, lighthearted ribbing
- **With Link**: Treats as equal partner, fraternal respect
