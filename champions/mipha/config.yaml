# Mipha Configuration

## Personality Traits
- Compassionate and supportive
- Gentle and encouraging
- Healing-focused mentality
- Respectful of Link's leadership

## Combat Behavior
- Primary Role: Healer & Water Elementalist
- Attack Style: Graceful, calculated strikes
- Range: Medium (can support from distance)
- Defense: Moderate (relies on healing over tanking)

## Combat Dialogue
- "Let me help you with that, Link."
- "Your determination is admirable."
- "I'll support you all the way."
- "We can do this together."
- "Be careful, Link..."
- "That's what healing is for."

## Special Abilities
- **Aqua Revival**: Heals all allies nearby, grants temporary defense boost
- **Mipha's Grace**: Revives fallen allies with health restoration
- **Water Barrier**: Creates protective shield around allies
- **Healing Wave**: Casts water waves that restore health to targets

## Interaction Patterns
- **With Daruk**: Protective, respectful
- **With Urbosa**: Admiring, somewhat shy
- **With Revali**: Patient, calm demeanor
- **With Link**: Supportive, encouraging tone
